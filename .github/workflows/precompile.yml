name: precompile

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  linux:
    name: Linux Erlang/OTP ${{matrix.otp}} / Elixir ${{matrix.elixir}}
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: "prod"
      CC: gcc-14
      CXX: g++-14
    strategy:
      matrix:
        include:
          - otp: "28.3"
            elixir: "1.18.4"
          - otp: "28.3"
            elixir: "1.19.5"
          - otp: "29.0.2"
            elixir: "1.20.2"
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}
      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential automake autoconf pkg-config bc m4 unzip zip \
            cmake ninja-build gcc-14 g++-14 patchelf \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu
      - name: Mix Test
        run: |
          mix deps.get
          MIX_ENV=test mix test
      - name: Create precompiled library
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          mix elixir_make.precompile
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nifs-linux-otp${{matrix.otp}}
          path: cache/*.tar.gz

  macos:
    runs-on: macos-15
    name: Mac (ARM) Erlang/OTP 29.0.2 / Elixir 1.20.2
    env:
      MIX_ENV: "prod"
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29.0.2"
          elixir-version: "1.20.2"
      - name: Install libomp
        run: |
          brew install libomp
          mix local.hex --force
          mix local.rebar --force
      - name: Mix Test
        run: |
          mix deps.get
          MIX_ENV=test mix test
      - name: Create precompiled library
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          mix elixir_make.precompile
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nifs-macos
          path: cache/*aarch64*.tar.gz

  release:
    needs: [linux, macos]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all NIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: cache
          merge-multiple: true

      - name: Generate checksum.exs
        run: |
          {
            echo "%{"
            for f in $(ls cache/*.tar.gz | sort); do
              sha=$(sha256sum "$f" | awk '{print $1}')
              fname=$(basename "$f")
              echo "  \"$fname\" => \"sha256:$sha\","
            done
            echo "}"
          } > checksum.exs
          cat checksum.exs

      - name: Commit checksum.exs and move tag
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add checksum.exs
          if git diff --staged --quiet; then
            echo "checksum.exs unchanged, skipping"
          else
            git commit -m "Add checksum.exs for ${{ github.ref_name }}"
            git tag -f ${{ github.ref_name }}
            git push --force origin ${{ github.ref_name }}
            git push origin HEAD:main || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: cache/*.tar.gz